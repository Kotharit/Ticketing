# Render.com service configuration
# See: https://docs.render.com/blueprint-spec
services:
  - type: web
    name: tenantdesk
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb -b tcp://0.0.0.0:$PORT"
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
